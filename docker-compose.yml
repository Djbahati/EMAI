version: '3.8'
services:
  app:
    build: 
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - EMAIL_USER=your-email@xticket.com
      - EMAIL_PASS=your-password
      - MONGO_URI=mongodb://mongodb:27017/crm
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
